<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- FIX 4: Corrected title from "Pacman WebVR" to "Pac-Man WebVR" (canonical spelling) -->
  <title>Pac-Man WebVR</title>
  <!-- FIX 5: Corrected meta description capitalisation to match title -->
  <meta name="description" content="Pac-Man WebVR using A-Frame">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
  <link rel="manifest" href="/assets/icons/site.webmanifest">
  <link rel="mask-icon" href="/assets/icons/safari-pinned-tab.svg" color="#2121de">
  <link rel="shortcut icon" href="/assets/icons/favicon.ico">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="msapplication-config" content="/assets/icons/browserconfig.xml">
  <meta name="theme-color" content="#ffffff">
  <script src="dist/bundle.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <!-- FIX 6: Added id="logo-container" so the CSS rule #logo-container
       (height: 100vh, margin: 0) actually targets this element.
       Previously the HTML used only class="logo-container", making the
       ID-based CSS selector a dead rule. -->
  <div id="logo-container" class="logo-container overlay">
    <img id="logo" src="assets/images/title-screen.png" alt="Pac-Man logo">
    <div id="level-select-wrap">
      <label for="level-select">Level</label>
      <select id="level-select" aria-label="Select start level">
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </div>
    <button id="start" disabled>
      <i class="fa fa-spinner fa-spin"></i>
    </button>
  </div>
  
  <div id="github" class="overlay">
    <a href="https://github.com/h4ckathon1sot/pacman2" class="github-corner" aria-label="View source on GitHub" target="_blank" rel="noopener noreferrer">
      <svg
        width="80" height="80" viewBox="0 0 250 250" style="fill:black; color:white; position: absolute; top: 0; border: 0; right: 0;"
        aria-hidden="true">
        <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
        <!-- FIX 7: Corrected typo `<patkh` → `<path`. The malformed tag caused
             the octo-arm animation to silently fail in strict XML parsers. -->
        <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2"
          fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
        <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z"
          fill="currentColor" class="octo-body"></path>
      </svg>
    </a>
    <style>.github-corner:hover .octo-arm{animation:octocat-wave 560ms ease-in-out}@keyframes octocat-wave{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-25deg)}40%,80%{transform:rotate(10deg)}}@media (max-width:500px){.github-corner:hover .octo-arm{animation:none}.github-corner .octo-arm{animation:octocat-wave 560ms ease-in-out}}</style>
  </div>

  <!-- FIX 8: Added aria-label for accessibility; icon-only buttons/divs need
       a label for screen readers. -->
  <div id="sound" class="overlay fa fa-volume-up fa-2x" role="button" aria-label="Toggle sound"></div>

  <!-- FIX 9: Standardised text to "GAME OVER" (two words, consistent with
       classic Pac-Man). The element was empty in the original; text is now
       set here as a sensible default (the JS may overwrite it at runtime). -->
  <div id="gameover" class="overlay">GAME OVER</div>
  <div id="ready" class="overlay">READY!</div>
  <canvas id="minimap" class="overlay" width="260" height="290"></canvas>

  <a-scene>
    <a-entity position="0 2.25 -15"
              particle-system="preset: dust">
    </a-entity>

    <a-assets>
      <a-asset-item id="navmesh" src="assets/models/navmesh.gltf"></a-asset-item>
      <a-asset-item id="ghost" src="assets/models/ghost.gltf"></a-asset-item>
      <a-asset-item id="maze" src="assets/models/maze.gltf"></a-asset-item>
      <img id="life" src="assets/images/pacman.png" alt="Life">
    </a-assets>

    <!-- Player -->
    <a-entity movement-controls="constrainToNavMesh: true"
              keyboard-controls="enabled: false"
              gamepad-controls="enabled: false"
              trackpad-controls="enabled: false"
              touch-controls="enabled: false"
              position="0 0 4"
              nav-agent="speed: 0.7; lookAtTarget: false"
              player>
      <a-camera position="0 1 0"
                wasd-controls="enabled: false"
                look-controls="enabled: false">
        <a-entity>
          <a-image position="-0.15 0.225 -0.3"
                   width="0.015"
                   height="0.015"
                   src="#life"
                   life>
          </a-image>
          <a-image position="-0.13 0.225 -0.3"
                   width="0.015"
                   height="0.015"
                   src="#life"
                   life>
          </a-image>
          <a-image position="-0.11 0.225 -0.3"
                   width="0.015"
                   height="0.015"
                   src="#life"
                   life>
          </a-image>
          <!-- FIX 10: Changed "HIGHSCORE" label to "HIGH SCORE" (two words)
               to match the canonical Pac-Man UI convention and the
               #highscore element label below. -->
          <a-entity position="0.08 0.235 -0.3"
                    text="color: white; align: center; value: HIGH SCORE; width: 0.4">
          </a-entity>
          <a-entity id="score"
                    position="-0.06 0.205 -0.3"
                    text="color: white; align: center; width: 0.4">
          </a-entity>
          <a-entity id="stage"
                    position="-0.20 0.235 -0.3"
                    text="color: #9DC1FF; align: left; value: STAGE: 1; width: 0.3">
          </a-entity>
          <a-entity id="ghostcount"
                    position="-0.20 0.205 -0.3"
                    text="color: #FF9E80; align: left; value: GHOSTS: 0/4; width: 0.3">
          </a-entity>
          <a-entity id="highscore"
                    position="0.08 0.205 -0.3"
                    text="color: white; align: center; width: 0.4">
          </a-entity>
          <a-entity id="powerup"
                    position="-0.20 0.175 -0.3"
                    text="color: #FFD54A; align: left; value: POWER: NONE; width: 0.3">
          </a-entity>
          <a-entity id="powertimer"
                    position="-0.20 0.145 -0.3"
                    text="color: #A8A8A8; align: left; value: PWR TIME: 0s; width: 0.3">
          </a-entity>
        </a-entity>
      </a-camera>
      <a-sphere color="yellow"
                radius="0.4"
                position="0 0.5 0.05">
      </a-sphere>
    </a-entity>

    <!-- Navigation mesh (hidden, used for pathfinding) -->
    <a-entity nav-mesh
              normal-material
              visible="false"
              gltf-model="#navmesh">
    </a-entity>

    <!-- Ghosts -->
    <a-gltf-model gltf-model="#ghost"
                  position="0 0 -2.1"
                  nav-agent="speed: 0.65"
                  ghost="0x00A6FF">
    </a-gltf-model>

    <a-gltf-model gltf-model="#ghost"
                  position="-1 0 -0.5"
                  nav-agent="speed: 0.65"
                  ghost="0xFF1744">
    </a-gltf-model>

    <a-gltf-model gltf-model="#ghost"
                  position="0 0 -0.5"
                  nav-agent="speed: 0.65"
                  ghost="0x39FF14">
    </a-gltf-model>

    <a-gltf-model gltf-model="#ghost"
                  position="1 0 -0.5"
                  nav-agent="speed: 0.65"
                  ghost="0xFF4FD8">
    </a-gltf-model>

    <!-- Scene geometry -->
    <a-gltf-model scale="1 1.6 1"
                  gltf-model="#maze"
                  maze>
    </a-gltf-model>

    <a-plane rotation="-90 0 0"
             width="15"
             height="16"
             color="black">
    </a-plane>

    <a-sky color="#000000"></a-sky>
  </a-scene>

  <!--
    =====================================================================
    JS PATCH — drop this block in before </body> OR integrate the logic
    into your bundle source files at the locations noted in the comments.
    =====================================================================
  -->
  <script>
    (function () {
      'use strict';

      // ── localStorage High Score persistence ────────────────────────────
      // FIX 11: Seed highScore from localStorage on load so it survives
      // page refreshes. Replace any `let highScore = 0` in your bundle
      // with this initialisation, or call getStoredHighScore() at init.
      const HS_KEY = 'pacman_highscore';

      function getStoredHighScore() {
        const stored = parseInt(localStorage.getItem(HS_KEY), 10);
        return isNaN(stored) ? 0 : stored;
      }

      function saveHighScore(value) {
        localStorage.setItem(HS_KEY, value);
      }

      // ── A-Frame component patch — lives & real-time high score ─────────
      // Wait until A-Frame registers its components so we can safely wrap
      // the `player` component's tick/update logic.
      window.addEventListener('load', function () {

        // ── Real-time High Score update helper ──────────────────────────
        // FIX 12: updateHighScore() can be called from eatPellet() or the
        // main tick. It updates both the in-memory value AND the A-Frame
        // text component immediately — not just at Game Over.
        function updateHighScore(currentScore, highScore) {
          if (currentScore > highScore) {
            highScore = currentScore;
            saveHighScore(highScore);                        // persist
            const el = document.querySelector('#highscore');
            if (el) el.setAttribute('text', 'value', highScore); // sync UI
          }
          return highScore;
        }

        // ── Lives display sync ──────────────────────────────────────────
        // FIX 13: syncLives(n) hides/shows the <a-image life> elements to
        // match the true live count. Call this every time lives changes
        // instead of only at game-over. Also fixes the off-by-one: the
        // loop hides images where index >= lives, so 0 lives = all hidden.
        function syncLives(lives) {
          const lifeEls = document.querySelectorAll('[life]');
          lifeEls.forEach(function (el, i) {
            el.setAttribute('visible', i < lives);
          });
        }

        // ── Expose helpers on window so bundle.js can call them ─────────
        // If you can edit bundle source, replace the inline logic there.
        // If you cannot, call these from a monkey-patched component below.
        window.PacmanUtils = {
          getStoredHighScore: getStoredHighScore,
          saveHighScore: saveHighScore,
          updateHighScore: updateHighScore,
          syncLives: syncLives,
        };

        // ── Sound toggle: ensure the listener isn't duplicated ──────────
        // FIX 14: Clone-and-replace pattern removes any existing listeners
        // before re-attaching, preventing duplicate toggle callbacks.
        const soundEl = document.getElementById('sound');
        if (soundEl) {
          const fresh = soundEl.cloneNode(true);
          soundEl.parentNode.replaceChild(fresh, soundEl);
          fresh.addEventListener('click', function () {
            this.classList.toggle('fa-volume-up');
            this.classList.toggle('fa-volume-off');
            // Wire to your bundle's mute/unmute method, e.g.:
            // if (window.SoundManager) SoundManager.toggle();
          });
        }

        // ── Start button: guard against duplicate listeners ─────────────
        // FIX 15: Same clone-and-replace approach for the start button.
        const startEl = document.getElementById('start');
        if (startEl) {
          const freshStart = startEl.cloneNode(true);
          startEl.parentNode.replaceChild(freshStart, startEl);
          freshStart.addEventListener('click', function () {
            // Your bundle should fire game start here. This guard ensures
            // the click only fires once even if the script is re-evaluated.
            if (typeof window.startGame === 'function') window.startGame();
          });
        }

        // ── Seed the high score display on page load ────────────────────
        const stored = getStoredHighScore();
        const hsEl = document.querySelector('#highscore');
        if (hsEl && stored > 0) {
          hsEl.setAttribute('text', 'value', stored);
        }
      });
    })();
  </script>
</body>
</html>
